<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor De Moedas</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <h1>Conversor do Top2</h1>
    

    <div class="input-group">
        <label>Valor</label>
        <input type="number" id="valor" placeholder="100" value="100">
    </div>

   <div class="row">
      <div class="input-group">
        <label>De</label>
        <select id="moeda-origem">
          <option value="USD">USD - Dólar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="BRL" selected>BRL - Real</option>
          <option value="GBP">GBP - Libra</option>
          <option value="JPY">JPY - Iene</option>
        </select>
      </div>


        <button id="btn-inverter" title="Inverter moedas">⇄</button>

          <div class="input-group">
        <label>Para</label>
        <select id="moeda-destino">
          <option value="USD" selected>USD - Dólar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="BRL">BRL - Real</option>
          <option value="GBP">GBP - Libra</option>
          <option value="JPY">JPY - Iene</option>
        </select>
      </div>
    </div>
    <button id="btn-converter">Converter</button>

    <div id="resultado" class="resultado hidden"></div>
    <div id="erro" class="erro hidden"></div>
</div>

<script src="./script.js"></script>
</body>
</html>
